[tool.semantic_release]
assets = ["dist/release.zip"]
commit_message = "{version}\n\nAutomatically generated by python-semantic-release"
commit_parser = "angular"
logging_use_named_masks = false
major_on_zero = true
tag_format = "v{version}"
# build_command = "zip -r dist/release.zip custom-components/spoolman"

[tool.semantic_release.branches.main]
match = "(main|master)"
prerelease_token = "rc"
prerelease = false

[tool.semantic_release.changelog]
# template_dir = "templates"
changelog_file = "INFO.md"

[tool.semantic_release.changelog.environment]
block_start_string = "{%"
block_end_string = "%}"
variable_start_string = "{{"
variable_end_string = "}}"
comment_start_string = "{#"
comment_end_string = "#}"
trim_blocks = false
lstrip_blocks = false
newline_sequence = "\n"
keep_trailing_newline = false
extensions = []
autoescape = true

[tool.semantic_release.commit_author]
env = "GIT_COMMIT_AUTHOR"
default = "semantic-release <semantic-release>"

[tool.semantic_release.commit_parser_options]
allowed_tags = [
    "build",
    "chore",
    "ci",
    "docs",
    "feat",
    "fix",
    "perf",
    "style",
    "refactor",
    "test",
]
minor_tags = ["feat"]
patch_tags = ["fix", "perf"]

[tool.semantic_release.remote]
name = "origin"
type = "github"
ignore_token_for_push = false

[tool.semantic_release.remote.token]
env = "GH_TOKEN"

[tool.semantic_release.publish]
dist_glob_patterns = ["dist/*"]
upload_to_vcs_release = true

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"
addopts = [
    "-ra",
    "--strict-markers",
    "--cov=custom_components.spoolman",
    "--cov-report=term-missing",
    "--cov-report=xml",
    "--cov-fail-under=90",
]

[tool.coverage.run]
source = ["custom_components/spoolman"]
branch = true
omit = [
    "custom_components/spoolman/__pycache__/*",
    # The legacy sensors/ tree is replaced in phase 3 by sensor_descriptions.py +
    # sensor_complex.py. Excluding it from coverage during the refactor
    # avoids writing throwaway tests; the post-phase-3 structure will hit 90%
    # naturally and this omit will be removed.
    "custom_components/spoolman/sensors/*",
    # Klipper integration is deprecated and slated for removal; it is
    # exercised through the config flow but not unit-tested in isolation.
    "custom_components/spoolman/classes/klipper_api.py",
]

[tool.coverage.report]
exclude_lines = [
    "pragma: no cover",
    "raise NotImplementedError",
    "if TYPE_CHECKING:",
    "if __name__ == .__main__.:",
]
show_missing = true
skip_covered = false

[tool.mypy]
python_version = "3.13"
explicit_package_bases = true
strict = true
warn_unused_ignores = true

[[tool.mypy.overrides]]
module = ["homeassistant.*", "pytest_homeassistant_custom_component.*", "aioresponses.*", "syrupy.*", "PIL.*"]
ignore_missing_imports = true
